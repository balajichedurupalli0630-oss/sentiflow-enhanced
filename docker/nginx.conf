# SentiFlow 3.0 — Nginx reverse proxy
# Place at: /etc/nginx/sites-available/sentiflow
# Enable:   ln -s /etc/nginx/sites-available/sentiflow /etc/nginx/sites-enabled/
# Test:     nginx -t
# Reload:   systemctl reload nginx
#
# Handles:
#   - HTTP → HTTPS redirect
#   - TLS termination (Let's Encrypt / certbot)
#   - WSS upgrade (wss://) for the extension WebSocket
#   - Rate limiting at the nginx layer (in addition to app-layer limits)
#   - Security headers

# ── Rate limiting zones ────────────────────────────────────────────────────────
limit_req_zone  $binary_remote_addr zone=sf_http:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=sf_ws:10m;

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ──────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;

    # TLS — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-Frame-Options           "DENY"         always;
    add_header Referrer-Policy           "no-referrer"  always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    # Allow WSS connections from the extension
    add_header Content-Security-Policy   "default-src 'none'; connect-src 'self' wss://yourdomain.com" always;

    # ── WebSocket endpoint (wss://) ────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Required headers for WebSocket upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Long timeouts for persistent WS connections
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;

        # Disable buffering for real-time streaming
        proxy_buffering off;

        # Max 10 concurrent WS connections per IP at nginx layer
        limit_conn sf_ws 10;
    }

    # ── REST endpoints ─────────────────────────────────────────────────────────
    location / {
        limit_req   zone=sf_http burst=15 nodelay;
        proxy_pass  http://127.0.0.1:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Block oversized request bodies (2KB is plenty for 2000 chars of text)
        client_max_body_size 2k;
        proxy_read_timeout   30s;
        proxy_connect_timeout 5s;
    }

    # ── Block hidden files ─────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}