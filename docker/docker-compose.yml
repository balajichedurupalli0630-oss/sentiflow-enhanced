version: '3.8'

services:
  sentiflow:
    build: .
    container_name: sentiflow_backend
    ports:
      - "8000:8000"
    environment:
      - USE_GPU=false
      - ALLOWED_ORIGIN=*
      - RATE_LIMIT_RPM=60
      - MAX_WS_PER_IP=5
      - LOG_LEVEL=info
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: sentiflow_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis_data:
    driver: local

networks:
  default:
    name: sentiflow_network